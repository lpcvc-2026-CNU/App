name: landmark_demo_app
description: Seoul Landmark recognition app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 올바른 패키지 명칭과 버전으로 수정
  onnxruntime: ^1.4.1 
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  image: ^4.1.3
  cupertino_icons: ^1.0.2
  image_picker: ^1.2.2

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 앱에서 사용할 모델 및 데이터 폴더 등록
  assets:
    - assets/
    - assets/mobile_artifacts_int8/
    - assets/hero_images/