name: landmark_demo_app
description: Seoul Landmark recognition app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # [금동엽] 인증 토큰 보안 저장 (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # [김규현] Firebase Cloud Messaging (FCM) 알림 인프라
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # [김규현] FastAPI 백엔드 통신 (건의/랜드마크/인증 API)
  http: ^1.2.0

  # 온디바이스 추론 및 공통 유틸
  onnxruntime: ^1.4.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  image: ^4.1.3
  cupertino_icons: ^1.0.2
  image_picker: ^1.1.2

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 앱에서 사용할 모델 및 데이터 폴더 등록
  assets:
    - assets/
    - assets/mobile_artifacts_fp16/
    - assets/hero_images/
