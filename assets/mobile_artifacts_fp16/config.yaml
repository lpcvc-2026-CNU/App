data:
  caption_languages:
  - ko
  - en
  class_balance_strategy: sqrt_weighted
  folds: 5
  max_captions_per_image: 6
  seed: 20260513
  strategy: locked_test_plus_5fold_trainval
  supervised_filter: label_status == confirmed and training_role in train_positive/low_weight_positive
  test_ratio: 0.15
evaluation:
  low_margin_threshold: 0.05
  outputs:
  - metrics.json
  - predictions_val.jsonl
  - predictions_test.jsonl
  - predictions_text_queries.jsonl
  - low_margin_val.csv
  - low_margin_test.csv
  primary_metric: val_top1_accuracy
  tie_breaker: val_top3_accuracy
loss:
  classification:
    label_smoothing: 0.05
    margin: 0.2
    scale: 30.0
    type: cross_entropy
    weight: 1.0
  hard_negative:
    enabled: true
    margin: 0.1
    source: labels.json confusing_with
    weight: 0.1
  image_text_contrastive:
    enabled: true
    positive_rule: same landmark_id image-caption pairs are positives
    temperature: 0.07
    weight: 0.3
optimizer:
  encoder_lr: 1.0e-05
  head_lr: 0.001
  lr_scheduler: cosine
  projection_lr: 0.0005
  type: adamw
  weight_decay: 0.05
runtime:
  backup: 'rclone gdrive:'
  gpu_count: 4
  grad_accum_steps: 2
  num_workers: 6
  precision: fp16_amp
  tracker: wandb
training:
  aug_randaugment_magnitude: 5
  aug_randaugment_num_ops: 2
  aug_random_resized_crop_min_scale: 0.8
  batch_size_per_gpu: 4
  embedding_dim: 512
  epochs: 30
  image_mean:
  - 0.48145466
  - 0.4578275
  - 0.40821073
  image_size: 224
  image_std:
  - 0.26862954
  - 0.26130258
  - 0.27577711
  min_lr_ratio: 0.01
  warmup_epochs: 2
model:
  id: mobileclip2_s3_server_full_ce_hardneg
  family: mobileclip2
  model_name: MobileCLIP2-S3
  pretrained: dfndr2b
  train_method: partial_unfreeze
  note: Paper-grade server experiment. Name uses server GPU context; server naming.
  image_unfreeze_ratio: 1.0
  text_unfreeze_ratio: 1.0
